name: Build Docs

on:
  push:
    paths:
      - README-source.adoc
      - docs/CONTRIBUTING-source.adoc
      - .github/copilot-instructions-source.adoc
      - docs/attributes.adoc
      - docs/gesinn-it-docs-master-pub
      - docs/gesinn-it-docs-master-pub/**
    branches:
      - '**'
  workflow_dispatch:

jobs:

  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor pandoc
          sudo gem install asciidoctor-reducer --pre

      # --- README ---

      - name: Reduce README
        run: asciidoctor-reducer -o README.adoc README-source.adoc

      - name: Add autogenerated header (README)
        run: |
          printf "// THIS FILE IS AUTO-GENERATED.\n// Edit README-source.adoc instead.\n\n" | cat - README.adoc > README.tmp
          mv README.tmp README.adoc

      # --- CONTRIBUTING ---

      - name: Reduce CONTRIBUTING
        run: asciidoctor-reducer -o docs/CONTRIBUTING.adoc docs/CONTRIBUTING-source.adoc

      - name: Add autogenerated header (CONTRIBUTING)
        run: |
          printf "// THIS FILE IS AUTO-GENERATED.\n// Edit docs/CONTRIBUTING-source.adoc instead.\n\n" | cat - docs/CONTRIBUTING.adoc > docs/CONTRIBUTING.tmp
          mv docs/CONTRIBUTING.tmp docs/CONTRIBUTING.adoc

      # --- Copilot Instructions ---

      - name: Reduce copilot-instructions source (flatten includes)
        run: |
          asciidoctor-reducer \
            -o .github/copilot-instructions.adoc \
            .github/copilot-instructions-source.adoc

      - name: Convert AsciiDoc to DocBook
        run: |
          asciidoctor \
            -b docbook5 \
            -o .github/copilot-instructions.xml \
            .github/copilot-instructions.adoc

      - name: Convert DocBook to Markdown
        run: |
          pandoc \
            -f docbook \
            -t gfm \
            .github/copilot-instructions.xml \
            -o .github/copilot-instructions.md

      - name: Add autogenerated header (copilot-instructions)
        run: |
          printf "<!-- THIS FILE IS AUTO-GENERATED. Edit .github/copilot-instructions-source.adoc instead. -->\n\n" | \
          cat - .github/copilot-instructions.md > tmp
          mv tmp .github/copilot-instructions.md

      - name: Remove intermediate files
        run: |
          rm -f .github/copilot-instructions.adoc
          rm -f .github/copilot-instructions.xml

      # --- Single commit ---

      - name: Commit generated files
        uses: EndBug/add-and-commit@v8
        with:
          add: |
            README.adoc
            docs/CONTRIBUTING.adoc
            .github/copilot-instructions.md
          pull: '--rebase --autostash'
          message: "docs(ci): update generated documentation [skip ci]"
