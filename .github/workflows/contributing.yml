name: Build Contributing

on:
  push:
    paths:
      - docs/CONTRIBUTING-source.adoc
      - docs/gesinn-it-docs-master-pub
      - docs/gesinn-it-docs-master-pub/**
    branches:
      - '**'
  workflow_dispatch:

jobs:

  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Install asciidoctor-reducer
        run: sudo gem install asciidoctor-reducer --pre

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Reduce contributing source
        run: asciidoctor-reducer -o docs/CONTRIBUTING.adoc docs/CONTRIBUTING-source.adoc

      - name: Add autogenerated header
        run: |
          printf "// THIS FILE IS AUTO-GENERATED.\n// Edit docs/CONTRIBUTING-source.adoc instead.\n\n" | cat - docs/CONTRIBUTING.adoc > docs/CONTRIBUTING.tmp
          mv docs/CONTRIBUTING.tmp docs/CONTRIBUTING.adoc

      - name: Commit contributing
        uses: EndBug/add-and-commit@v8
        with:
          add: 'docs/CONTRIBUTING.adoc'
          pull: '--rebase --autostash'
          message: "docs(ci): update generated CONTRIBUTING [skip ci]"
